<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Webpage Editor</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="stylesheet" href="shared.css">
    <link rel="stylesheet" href="editor.css">
</head>
<body>
<header>
    <h1 class="project-name"><img src="logo.png" alt="AI Website Editor logo" class="project-logo">AI Website Editor</h1>
    <nav>
        <section class="page-links">
            <a href="main-page.html" class="main-page">Main</a>
            <a href="editor-page.html" class="editor-page">Editor</a>
        </section>
        <a href="" class="signup-page">Sign Up</a>
    </nav>
</header>
<main>
    <section class="webpage-editor-area"></section>
    <section class="chatbot-conversation-area">
        <div class="conversation-title-area">
            <p class="conversation-title">  
                Chatbot
                <img src="chatbot-title-emoji.png" alt="Chatbot Emoji" class="chatbot-title-emoji">
            </p>
            <div class="user-project-meta-data">
                <p class="user-project-title">Project Name</p>
                <p class="user-project-description"><img src="user-project-description-emoji.png" alt="Chatbot Emoji" class="user-project-description-emoji"></p>
            </div>
        </div>
    </section>
</main>
<footer class="dummy-footer">
    <div class="dummy-footer-brand">
      <h4 id="footer-title">AI Website Editor</h4>
      <p>Build pages faster with smart templates.</p>
    </div>
    <div class="dummy-footer-links">
      <a href="#">About</a>
      <a href="#">Templates</a>
      <a href="#">Support</a>
    </div>
    <p class="dummy-footer-copy">© 2026 AI Website Editor. All rights reserved.</p>
</footer>
<script>
  const navLinks = document.querySelectorAll(".page-links a");
  const currentPage = window.location.pathname.split("/").pop() || "main-page.html";
  navLinks.forEach((link) => {
    const href = link.getAttribute("href");
    if (href === currentPage) {
      link.classList.add("nav-active");
    } else {
      link.classList.remove("nav-active");
    }
  });
</script>
</body>
</html>
