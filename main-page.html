<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Webpage Editor</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="stylesheet" href="shared.css">
    <link rel="stylesheet" href="main.css">
</head>
<body>
<header>
  <h1 class="project-name"><img src="logo.png" alt="AI Website Editor logo" class="project-logo">AI Website Editor</h1>
  <nav>
    <section class="page-links">
      <a href="main-page.html" class="main-page">Main</a>
      <a href="editor-page.html" class="editor-page">Editor</a>
    </section>
    <a href="" class="signup-page">Sign Up</a>
  </nav>
</header>
<main>
  <section class="side-panel">
    <h3 id="side-panel-title">Webpage Generator Panel</h3>
    <div class="side-panel-button-group">
      <button class="side-panel-buttons">
        <span class="side-panel-button-title">Page Categories</span>
        <span class="side-panel-button-selected">None</span>
        <div class="side-panel-hover-box">
          <ul class="hover-box-options">
            <li class="hover-box-option">None</li>
            <li class="hover-box-option">Portfolio Website</li>
            <li class="hover-box-option">Business Landing Page</li>
            <li class="hover-box-option">Blog Template</li>
            <li class="hover-box-option">Personal Resume Page</li>
          </ul>
        </div>
      </button>
    </div>
    <input 
      type="text" 
      class="website-description-text-box" 
      placeholder="Describe the webpage you wanna make...."
      />
    <button class="generate-page-button">Generate Page!</button>
  </section>
  <section class="page-categories">
    <div class="page-category">
      <h3 class="page-category-title">Your Pages</h3>
      <div class="pages-list"> 
        <div class="page start-page-card" id="start-page"></div>
        <div class="page"></div>
        <div class="page"></div>
      </div>
    </div>
    <div class="page-category">
      <h3 class="page-category-title">Your Pages</h3>
      <div class="pages-list"> 
        <div class="page start-page-card"></div>
        <div class="page"></div>
        <div class="page"></div>
      </div>
    </div>
  </section>
</main>
<footer class="dummy-footer">
  <div class="dummy-footer-brand">
    <h4 id="footer-title">AI Website Editor</h4>
    <p>Build pages faster with smart templates.</p>
  </div>
  <div class="dummy-footer-links">
    <a href="#">About</a>
    <a href="#">Templates</a>
    <a href="#">Support</a>
  </div>
  <p class="dummy-footer-copy">© 2026 AI Website Editor. All rights reserved.</p>
</footer>


<script>
  const sidePanelGroup = document.querySelector(".side-panel-button-group");
  const sidePanelSelectedText = document.querySelector(".side-panel-button-selected");
  const optionItems = document.querySelectorAll(".hover-box-option");
  let hideHoverBoxTimer;

  sidePanelGroup.addEventListener("mouseenter", () => {
    clearTimeout(hideHoverBoxTimer);
    sidePanelGroup.classList.add("is-open");
  });

  sidePanelGroup.addEventListener("mouseleave", () => {
    hideHoverBoxTimer = setTimeout(() => {
      sidePanelGroup.classList.remove("is-open");
    }, 250);
  });

  optionItems.forEach((item) => {
    item.addEventListener("click", () => {
      sidePanelSelectedText.textContent = item.textContent.trim();
    });
  });
</script>

</body>
</html>
